name: Bats Tests

on:
  push:
  pull_request:

jobs:
  bats:
    name: Run Bats tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run tests
        run: bats tests
